global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'lifeguard'
    static_configs:
      - targets: ['host.docker.internal:9898']

  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:9464']

  # No postgres-exporter job: the repo does not ship that service. Sample stacks often use a
  # leftover `pact` DB user; our Kind Postgres is `postgres`/`postgres` only (see test-infrastructure).
  # Re-add a scrape_config only when you deploy an exporter with matching DATA_SOURCE_URI.
