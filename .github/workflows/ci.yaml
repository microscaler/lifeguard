name: Lifeguard CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    # All DB/Redis dependencies: `.github/docker/docker-compose.yml` (host primary :6543, replica :6544, Redis :6545 — avoids 5432/5433/6379 for Kind/Tilt).
    # Started via hoverkraft-tech/compose-action (up: `-d --wait`; post hook: `compose down -v`). See https://github.com/marketplace/actions/docker-compose-action
    # No `jobs.*.services` — avoids duplicating Postgres/Redis and conflicting ports with Compose.
    # `TEST_DATABASE_URL` / `TEST_REPLICA_URL` / Redis URLs for `tests/context.rs`; `DATABASE_URL` for `TestDatabase::get_connection_string`.
    # Repository secret `PGPASSWORD`: exported to steps; Compose file interpolates `${PGPASSWORD}`; URLs / `psql` use the same. Not available to workflows from fork PRs.
    env:
      PGPASSWORD: ${{ secrets.PGPASSWORD }}
      DATABASE_URL: postgres://postgres:${{ secrets.PGPASSWORD }}@localhost:6543/postgres
      TEST_DATABASE_URL: postgres://postgres:${{ secrets.PGPASSWORD }}@localhost:6543/postgres
      TEST_REPLICA_URL: postgres://postgres:${{ secrets.PGPASSWORD }}@localhost:6544/postgres
      REDIS_URL: redis://127.0.0.1:6545
      TEST_REDIS_URL: redis://127.0.0.1:6545

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2025-06-30
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Start CI stack (Postgres primary + replica + Redis)
        uses: hoverkraft-tech/compose-action@4894d2492015c1774ee5a13a95b1072093087ec3 # v2.5.0
        with:
          compose-file: .github/docker/docker-compose.yml
          up-flags: -d --wait
          down-flags: -v

      - name: Build
        run: cargo check

      - name: Lint
        run: cargo clippy --all-targets --all-features -- -D warnings -W clippy::pedantic

      # Migration tooling: drop committed generated SQL, regenerate from `examples/entities`, apply
      # with psql before any job step that uses Postgres (workspace tests, db_integration_suite, coverage).
      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Regenerate entity migrations and apply to Postgres
        run: |
          set -euo pipefail
          rm -rf migrations/generated
          (cd examples/entities && cargo run --bin generate-migrations)
          gen="migrations/generated"
          order_file="$gen/apply_order.txt"
          sql_files=()
          if [ -f "$order_file" ]; then
            while IFS= read -r line || [[ -n "${line:-}" ]]; do
              line="${line//$'\r'/}"
              [[ -z "${line// }" || "$line" =~ ^[[:space:]]*# ]] && continue
              sql_files+=("$gen/$line")
            done < "$order_file"
          fi
          if [ "${#sql_files[@]}" -eq 0 ]; then
            mapfile -t sql_files < <(find "$gen" -name '*.sql' -type f | sort)
          fi
          if [ "${#sql_files[@]}" -eq 0 ]; then
            echo '::error::No SQL files under migrations/generated after generate-migrations'
            exit 1
          fi
          for f in "${sql_files[@]}"; do
            echo "Applying $f"
            psql -h 127.0.0.1 -p 6543 -U postgres -d postgres -v ON_ERROR_STOP=1 -f "$f"
          done

      # Pin nextest: newer releases (e.g. 0.9.132+) require rustc 1.91+; CI uses nightly-2025-06-30.
      - name: Install cargo-nextest
        run: cargo install cargo-nextest --locked --version 0.9.128

      - name: Run lifeguard-derive tests
        run: |
          cd lifeguard-derive
          cargo test --no-fail-fast

      - name: Run lifeguard-codegen tests
        run: |
          cd lifeguard-codegen
          cargo test --no-fail-fast
        continue-on-error: true  # Allow to fail if codegen crate doesn't exist yet

      # Exclude `db_integration_suite`: parallel DDL on one Postgres flakes (duplicate types, max connections).
      # Job `env` supplies DATABASE_URL / TEST_DATABASE_URL to all steps.
      - name: Run workspace tests
        run: cargo nextest run --workspace --all-features --profile ci -E 'not binary(db_integration_suite)'

      - name: Run lifeguard db_integration_suite (serial)
        run: cargo nextest run -p lifeguard --all-features --profile db-serial -E 'binary(db_integration_suite)'

      - name: Install llvm-tools
        run: rustup component add llvm-tools-preview

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      # `llvm-cov` runs `cargo test` (not nextest). Integration tests in `db_integration_suite` must not
      # run in parallel against one DB — same as local `cargo test` without `--test-threads=1`.
      - name: Code coverage
        env:
          RUST_TEST_THREADS: 1
        run: |
          cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info
          cargo llvm-cov --all-features --workspace --summary-only

  # IDAM-shaped ORM harness (`examples/perf-idam`); non-blocking latency artifact. Chains after `test`.
  perf_orm:
    name: ORM perf (perf-idam)
    needs: test
    runs-on: ubuntu-latest
    # Same `.github/docker/docker-compose.yml` and hoverkraft-tech/compose-action pattern as `test`.
    env:
      PGPASSWORD: ${{ secrets.PGPASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2025-06-30

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            examples/perf-idam/target
          key: cargo-perf-idam-${{ runner.os }}-${{ hashFiles('examples/perf-idam/Cargo.lock') }}

      - name: Start CI stack (Postgres primary + replica + Redis)
        uses: hoverkraft-tech/compose-action@4894d2492015c1774ee5a13a95b1072093087ec3 # v2.5.0
        with:
          compose-file: .github/docker/docker-compose.yml
          up-flags: -d --wait
          down-flags: -v

      # perf-orm: Compose host ports :6543 / :6544 / :6545 (see `.github/docker/docker-compose.yml`).
      - name: Run perf-orm
        env:
          PERF_DATABASE_URL: postgres://postgres:${{ secrets.PGPASSWORD }}@127.0.0.1:6543/postgres
          PERF_REPLICA_URL: postgres://postgres:${{ secrets.PGPASSWORD }}@127.0.0.1:6544/postgres
          REDIS_URL: redis://127.0.0.1:6545
          TEST_REDIS_URL: redis://127.0.0.1:6545
          PERF_RESET: "1" # destructive DDL on perf_* tables
          PERF_POOL_SIZE: "8" # primary tier slots; JSON `replica_connections` when replica enabled
          PERF_TENANT_COUNT: "10"
          PERF_USER_ROWS: "2000"
          PERF_SESSION_ROWS: "2000"
          PERF_WARMUP: "100"
          PERF_ITERATIONS: "500"
          PERF_OUTPUT: perf-results.json
        run: |
          set -euo pipefail
          cd examples/perf-idam
          cargo run --release --locked --bin perf-orm

      - name: Upload perf JSON
        uses: actions/upload-artifact@v4
        with:
          name: perf-results
          path: examples/perf-idam/perf-results.json
          retention-days: 3
