name: Lifeguard CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    # Postgres is the `services.postgres` container below; the job connects via localhost:5432.
    # `TEST_DATABASE_URL` matches `TestDatabase` / `tests/context.rs` priority; `DATABASE_URL` is the fallback.
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2025-06-30
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo check

      - name: Lint
        run: cargo clippy --all-targets --all-features -- -D warnings -W clippy::pedantic

      - name: Install cargo-nextest
        run: cargo install cargo-nextest --locked

      - name: Run lifeguard-derive tests
        run: |
          cd lifeguard-derive
          cargo test --no-fail-fast

      - name: Run lifeguard-codegen tests
        run: |
          cd lifeguard-codegen
          cargo test --no-fail-fast
        continue-on-error: true  # Allow to fail if codegen crate doesn't exist yet

      # Exclude `db_integration_suite`: parallel DDL on one Postgres flakes (duplicate types, max connections).
      # Job `env` supplies DATABASE_URL / TEST_DATABASE_URL to all steps.
      - name: Run workspace tests
        run: cargo nextest run --workspace --all-features --profile ci -E 'not binary(db_integration_suite)'

      - name: Run lifeguard db_integration_suite (serial)
        run: cargo nextest run -p lifeguard --all-features --profile db-serial -E 'binary(db_integration_suite)'

      - name: Install llvm-tools
        run: rustup component add llvm-tools-preview

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      # `llvm-cov` runs `cargo test` (not nextest). Integration tests in `db_integration_suite` must not
      # run in parallel against one DB — same as local `cargo test` without `--test-threads=1`.
      - name: Code coverage
        env:
          RUST_TEST_THREADS: 1
        run: |
          cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info
          cargo llvm-cov --all-features --workspace --summary-only
