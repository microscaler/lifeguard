# CI and local integration dependencies: Postgres primary + streaming replica + Redis.
# GitHub Actions `services:` cannot set up replication; this file is the single source for `test` and `perf_orm` jobs.
#
# Host ports use the **6543 / 6544 / 6545** range so this stack does not bind **5432 / 5433 / 6379** on the
# host — those are typically used by Kind/Tilt Postgres and Redis while developing (Grafana dashboards, etc.).
# For CI, job env vars point at these ports; for local Tilt, use your cluster connection strings instead.
#
# Usage: `PGPASSWORD` must be set in the environment (no default in this file — secret scanners / policy).
#   export PGPASSWORD=…   # same value as GitHub Actions secret `PGPASSWORD` and `psql`
#   docker compose -f .github/docker/docker-compose.yml up -d --wait
#
# JDBC-style URLs use the same value (percent-encode reserved characters in the secret):
#   postgresql://postgres:<value-from-PGPASSWORD-env>@127.0.0.1:6543/postgres
#   postgresql://postgres:<value-from-PGPASSWORD-env>@127.0.0.1:6544/postgres
#   Redis:    redis://127.0.0.1:6545
#
# Postgres: Bitnami legacy PostgreSQL 15 (`bitnamilegacy/postgresql:15`).

name: lifeguard-ci

services:
  postgresql-primary:
    image: docker.io/bitnamilegacy/postgresql:15
    ports:
      - "6543:5432"
    environment:
      POSTGRESQL_REPLICATION_MODE: master
      POSTGRESQL_REPLICATION_USER: replicator
      POSTGRESQL_REPLICATION_PASSWORD: ${PGPASSWORD:?PGPASSWORD must be set}
      POSTGRESQL_USERNAME: postgres
      POSTGRESQL_PASSWORD: ${PGPASSWORD:?PGPASSWORD must be set}
      POSTGRESQL_DATABASE: postgres
      # Integration tests + replication reserve slots; avoid E53300 during heavy CI.
      POSTGRESQL_MAX_CONNECTIONS: "200"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres -h 127.0.0.1 -p 5432"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 40s

  postgresql-replica:
    image: docker.io/bitnamilegacy/postgresql:15
    ports:
      - "6544:5432"
    depends_on:
      postgresql-primary:
        condition: service_healthy
    environment:
      POSTGRESQL_REPLICATION_MODE: slave
      POSTGRESQL_REPLICATION_USER: replicator
      POSTGRESQL_REPLICATION_PASSWORD: ${PGPASSWORD:?PGPASSWORD must be set}
      POSTGRESQL_MASTER_HOST: postgresql-primary
      POSTGRESQL_MASTER_PORT_NUMBER: "5432"
      POSTGRESQL_PASSWORD: ${PGPASSWORD:?PGPASSWORD must be set}
      POSTGRESQL_MASTER_ROOT_USER: postgres
      POSTGRESQL_MASTER_ROOT_PASSWORD: ${PGPASSWORD:?PGPASSWORD must be set}
      POSTGRESQL_MAX_CONNECTIONS: "200"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres -h 127.0.0.1 -p 5432"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 90s

  redis:
    image: redis:7-alpine
    ports:
      - "6545:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
