apiVersion: v1
kind: Service
metadata:
  name: {{ include "postgres.serviceName" . }}
  labels:
    {{- include "postgres.labels" . | nindent 4 }}
    app: {{ include "postgres.primaryName" . }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: postgresql
      port: {{ .Values.service.port }}
      targetPort: postgresql
      protocol: TCP
  selector:
    app: {{ include "postgres.primaryName" . }}
