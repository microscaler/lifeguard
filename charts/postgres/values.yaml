# Lifeguard postgres chart — primary-direct (no Pgpool).
# Override via values/shared-kind.yaml for the shared Kind `data` namespace.

nameOverride: ""
fullnameOverride: ""

image:
  registry: docker.io
  repository: bitnamilegacy/postgresql
  tag: "15"
  pullPolicy: IfNotPresent

# Bitnami runs as UID 1001.
podSecurityContext:
  fsGroup: 1001

auth:
  username: postgres
  database: postgres
  # When empty, chart creates a Secret (dev only). Prefer existingSecret in shared clusters.
  existingSecret: ""
  # Keys inside the Secret (lifeguard-test defaults). shared-kind uses postgres-*.
  passwordKey: postgresql-password
  replicationPasswordKey: postgresql-replication-password
  # Used only when existingSecret is empty.
  password: postgres
  replicationPassword: postgres
  replicationUser: replicator

postgresql:
  maxConnections: "200"

primary:
  # Resource / label name for the primary Deployment (selector app=…).
  name: postgresql-primary
  persistence:
    enabled: true
    existingClaim: ""
    storageClass: ""
    accessModes:
      - ReadWriteOnce
    size: 1Gi
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  livenessProbe:
    initialDelaySeconds: 60
    periodSeconds: 10
  readinessProbe:
    initialDelaySeconds: 10
    periodSeconds: 5

# App-facing Service — always selects the primary (never a standby).
service:
  name: "" # default: primary.name
  type: ClusterIP
  port: 5432
  annotations: {}
  # e.g. metallb.universe.tf/loadBalancerIPs: "10.177.76.224"

# Streaming standbys for Lifeguard WAL-lag / read-routing tests. Off by default
# for shared multi-tenant Kind stability; enable for lifeguard-test parity.
replica:
  enabled: false
  count: 0
  # namePrefix + index → postgresql-replica-0
  namePrefix: postgresql-replica
  masterHost: "" # default: service DNS name in-release
  persistence:
    enabled: true
    storageClass: ""
    accessModes:
      - ReadWriteOnce
    size: 1Gi
  resources: {}
  service:
    enabled: true
    type: ClusterIP
  livenessProbe:
    initialDelaySeconds: 90
    periodSeconds: 15
  readinessProbe:
    initialDelaySeconds: 60
    periodSeconds: 10

# postStart SQL (ConfigMap). Lifeguard schema is always included when enabled.
initScripts:
  enabled: true
  # Extra SQL files under charts/postgres/files/ (basename → mount path).
  # 11-lifeguard-schema.sql is always mounted when initScripts.enabled.
  extraFiles: []
  # - 10-pact-role.sql

exporter:
  enabled: false
  image:
    registry: quay.io
    repository: prometheuscommunity/postgres-exporter
    tag: v0.15.0
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi
  # When empty, built from auth + service DNS (password from values — not for production).
  dataSourceName: ""

commonLabels: {}
commonAnnotations: {}
