apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: lifeguard-test

resources:
  - namespace.yaml
  - postgresql-credentials-secret.yaml
  - postgresql-primary-pvc.yaml
  - postgresql-primary-deployment.yaml
  - postgresql-primary-service.yaml
  - postgresql-replica-0-pvc.yaml
  - postgresql-replica-0-deployment.yaml
  - postgresql-replica-0-service.yaml
  - postgresql-replica-1-pvc.yaml
  - postgresql-replica-1-deployment.yaml
  - postgresql-replica-1-service.yaml
  - redis-deployment.yaml
  - redis-service.yaml

configMapGenerator:
  - name: postgres-pact-init
    files:
      - 10-pact-role.sql=postgres-pact-role.sql
    options:
      disableNameSuffixHash: true
