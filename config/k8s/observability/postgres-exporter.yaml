apiVersion: v1
kind: Service
metadata:
  name: postgres-exporter
  labels:
    app: postgres-exporter
spec:
  selector:
    app: postgres-exporter
  ports:
    - name: metrics
      port: 9187
      targetPort: metrics
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-exporter
  labels:
    app: postgres-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-exporter
  template:
    metadata:
      labels:
        app: postgres-exporter
    spec:
      containers:
        - name: postgres-exporter
          image: quay.io/prometheuscommunity/postgres-exporter:v0.15.0
          args:
            - --web.listen-address=:9187
          env:
            # Single DSN (avoid DATA_SOURCE_URI + other env vars merging badly in some exporter versions).
            - name: DATA_SOURCE_NAME
              value: postgresql://postgres:postgres@postgresql-primary:5432/postgres?sslmode=disable
          ports:
            - name: metrics
              containerPort: 9187
          livenessProbe:
            httpGet:
              path: /
              port: metrics
            initialDelaySeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: metrics
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
